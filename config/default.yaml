app:
  name: "RuView Scan"
  version: "1.0.0"

nic:
  interface: auto
  monitor_interface: wlan0mon

measurement:
  points:
    - id: north
      label: "北壁側 (pos.1)"
      description: "ノートPCを北壁から1mの位置に配置"
    - id: east
      label: "東壁側 (pos.2)"
      description: "ノートPCを東壁から1mの位置に配置"
    - id: south
      label: "南壁側 (pos.3)"
      description: "ノートPCを南壁から1mの位置に配置"
    - id: west
      label: "西壁側 (pos.4)"
      description: "ノートPCを西壁から1mの位置に配置"
    - id: center
      label: "中心 (pos.5)"
      description: "ノートPCを部屋中央に配置"
    # Phase D: 追加測定点 (オプション - カバレッジ改善用)
    - id: northeast
      label: "北東角 (pos.6)"
      description: "ノートPCを北東角から1mの位置に配置"
      optional: true
    - id: southeast
      label: "南東角 (pos.7)"
      description: "ノートPCを南東角から1mの位置に配置"
      optional: true
    - id: southwest
      label: "南西角 (pos.8)"
      description: "ノートPCを南西角から1mの位置に配置"
      optional: true
    - id: northwest
      label: "北西角 (pos.9)"
      description: "ノートPCを北西角から1mの位置に配置"
      optional: true

  duration_per_band: 30        # 秒（1バンドあたり）
  bands:
    - frequency: 2.4GHz
      channel: 1
      bandwidth: 40            # MHz
      subcarriers: 114
    - frequency: 5GHz
      channel: 36
      bandwidth: 80            # MHz
      subcarriers: 234
    - frequency: 5GHz_160
      channel: 36
      bandwidth: 160           # MHz
      subcarriers: 468
  sample_rate: 100             # Hz

csi:
  source: simulate             # 'picoscenes' or 'simulate'
  udp_port: 5500

analysis:
  tof:
    method: music              # 'ifft', 'music', 'esprit'
    n_paths: 8                 # 推定パス数
  aoa:
    method: music
  reflection_map:
    grid_resolution: 0.05     # メートル（5cm）
    gaussian_sigma: 2.0       # 平滑化パラメータ
  structure_detection:
    metal_threshold: 0.6
    nonmetal_threshold: 0.35
    min_length: 0.3           # メートル
  foreign_detection:
    rf_enabled: true
    csi_residual_threshold: 0.5
    min_cluster_size: 3       # ピクセル

server:
  host: 127.0.0.1
  port: 8080

logging:
  level: INFO
  file: ./logs/ruview-scan.log

  # Phase B: スライドバー深度調整
  depth_slider:
    default_lower: 0.0       # 下限閾値 (0.0〜1.0)
    default_upper: 1.0       # 上限閾値 (0.0〜1.0)
    spread_sigma_m: 1.5      # 振幅の空間拡散σ (メートル)
